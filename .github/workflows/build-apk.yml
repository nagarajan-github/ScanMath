name: Build APK

# Builds a debug APK on every push and lets you download it from the run's
# "Artifacts" section. You can also trigger it manually from the Actions tab.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Generate the Gradle wrapper if it isn't committed, then build.
      - name: Build debug APK
        run: |
          if [ ! -f gradlew ]; then gradle wrapper --gradle-version 8.9; fi
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMath-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
